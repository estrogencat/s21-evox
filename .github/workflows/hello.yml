name: Publish OTA Update

on:
  workflow_dispatch: 

jobs:
  update-ota-map:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: scrape sourceforge and update json
        run: |
          python3 -c "
          import urllib.request, json, time, sys, re, hashlib
          
          print('fetching sourceforge rss feed')
          url = 'https://sourceforge.net/projects/hazel-evolutionx/rss?path=/a16'
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          rss_text = urllib.request.urlopen(req).read().decode('utf-8')
          
          items = re.findall(r'<item>(.*?)</item>', rss_text, re.IGNORECASE | re.DOTALL)
          
          target_item = None
          for item in items:
              if '.zip' in item:
                  target_item = item
                  break
                  
          if not target_item:
              print('error: no .zip files found in the feed!')
              sys.exit(1)
              
          url_match = re.search(r'<link>(.*?)</link>', target_item, re.IGNORECASE)
          raw_url = url_match.group(1) if url_match else ''
          download_url = raw_url.replace('<![CDATA[', '').replace(']]>', '').strip()
          
          name_match = re.search(r'/([^/]+\.zip)', download_url, re.IGNORECASE)
          if not name_match:
              print('error: could not parse filename from sourceforge link')
              sys.exit(1)
          filename = name_match.group(1)
          
          version_match = re.search(r'-(\d+\.\d+)[^\.]*\.zip$', filename, re.IGNORECASE)
          rom_version = version_match.group(1) if version_match else '11.8'
          
          size_match = re.search(r'(?:filesize|length)=[\"\'](\d+)[\"\']', target_item, re.IGNORECASE)
          filesize = int(size_match.group(1)) if size_match else 0
          
          md5_match = re.search(r'<[^>]*hash[^>]*algo=[\"\']md5[\"\'][^>]*>([a-fA-F0-9]{32})<', target_item, re.IGNORECASE)
          md5 = md5_match.group(1) if md5_match else ''
          
          app_id = hashlib.sha256(md5.encode()).hexdigest()
          
          timestamp = int(time.time())
          
          print(f'found latest build: {filename}')
          print(f'size: {filesize} bytes | sha256: {app_id}')
          print(f'extracted version: {rom_version}')
          
          with open('o1s.json', 'r') as f:
              data = json.load(f)
              
          data['response'][0]['timestamp'] = timestamp
          data['response'][0]['filename'] = filename
          data['response'][0]['size'] = filesize
          data['response'][0]['download'] = download_url
          data['response'][0]['version'] = rom_version
          
          with open('o1s.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

      - name: commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add o1s.json
          git commit -m "build: automated ota push for latest upload"
          git push
