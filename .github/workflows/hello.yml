name: Publish OTA Update

on:
  workflow_dispatch: 

jobs:
  update-ota-map:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: scrape sourceforge, calculate sha256, and update json
        run: |
          python3 -c "
          import urllib.request, json, time, sys, re, hashlib
          
          print('fetching sourceforge rss feed...')
          url = 'https://sourceforge.net/projects/hazel-evolutionx/rss?path=/a16'
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          rss_text = urllib.request.urlopen(req).read().decode('utf-8')
          
          # extract the newest .zip item
          items = re.findall(r'<item>(.*?)</item>', rss_text, re.IGNORECASE | re.DOTALL)
          target_item = None
          for item in items:
              if '.zip' in item:
                  target_item = item
                  break
                  
          if not target_item:
              print('error: no .zip files found in the feed!')
              sys.exit(1)
              
          # scrape link and filename
          url_match = re.search(r'<link>(.*?)</link>', target_item, re.IGNORECASE)
          raw_url = url_match.group(1) if url_match else ''
          download_url = raw_url.replace('<![CDATA[', '').replace(']]>', '').strip()
          
          name_match = re.search(r'/([^/]+\.zip)', download_url, re.IGNORECASE)
          filename = name_match.group(1) if name_match else 'unknown.zip'
          
          # scrape exact filesize
          size_match = re.search(r'(?:filesize|length)=[\"\'](\d+)[\"\']', target_item, re.IGNORECASE)
          filesize = int(size_match.group(1)) if size_match else 0
          
          print(f'found latest build: {filename}')
          print('streaming file from sourceforge to calculate true sha-256... (this takes about 30 seconds!)')
          
          # stream the massive file into memory chunks and hash it on the fly!
          sha256_hash = hashlib.sha256()
          req_dl = urllib.request.Request(download_url, headers={'User-Agent': 'Mozilla/5.0'})
          try:
              with urllib.request.urlopen(req_dl) as response:
                  while True:
                      chunk = response.read(1024 * 1024) # 1MB at a time
                      if not chunk:
                          break
                      sha256_hash.update(chunk)
              file_hash = sha256_hash.hexdigest()
          except Exception as e:
              print(f'error downloading file for hash: {e}')
              sys.exit(1)
              
          timestamp = int(time.time())
          
          print(f'size: {filesize} bytes | sha-256: {file_hash}')
          
          # inject perfectly into ur map
          with open('o1s.json', 'r') as f:
              data = json.load(f)
              
          data['response'][0]['datetime'] = timestamp
          data['response'][0]['filename'] = filename
          data['response'][0]['size'] = filesize
          data['response'][0]['id'] = file_hash
          data['response'][0]['url'] = download_url
          
          with open('o1s.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

      - name: commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add o1s.json
          git commit -m "build: automated ota push for latest upload"
          git push
