name: Publish OTA Update

on:
  workflow_dispatch: 

jobs:
  update-ota-map:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: scrape sourceforge and update json
        run: |
          python3 -c "
          import urllib.request, json, time, sys, re
          
          print('fetching sourceforge rss feed...')
          url = 'https://sourceforge.net/projects/hazel-evolutionx/rss?path=/a16'
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          rss_text = urllib.request.urlopen(req).read().decode('utf-8')
          
          # extract all items using regex to bypass xml namespace headaches
          items = re.findall(r'<item>(.*?)</item>', rss_text, re.IGNORECASE | re.DOTALL)
          
          target_item = None
          for item in items:
              if '.zip' in item:
                  target_item = item
                  break
                  
          if not target_item:
              print('error: no .zip files found in the feed!')
              sys.exit(1)
              
          # scrape the exact filename (ignores the /a16/ folder path)
          filename_match = re.search(r'<title>[^<]*?([^/<\s]+\.zip)</title>', target_item, re.IGNORECASE)
          filename = filename_match.group(1) if filename_match else 'lineage_o1s-ota.zip'
          
          # scrape the download link
          url_match = re.search(r'<link>(.*?)</link>', target_item, re.IGNORECASE)
          download_url = url_match.group(1) if url_match else ''
          
          # aggressively rip the filesize out of either the media or enclosure tag
          size_match = re.search(r'(?:filesize|length)=[\"\'](\d+)[\"\']', target_item, re.IGNORECASE)
          if not size_match:
              print('error: could not find file size metadata! dumping raw xml block:')
              print(target_item)
              sys.exit(1)
          filesize = int(size_match.group(1))
          
          # violently rip the md5 hash out of the media tag
          md5_match = re.search(r'<[^>]*hash[^>]*algo=[\"\']md5[\"\'][^>]*>([a-fA-F0-9]{32})<', target_item, re.IGNORECASE)
          md5 = md5_match.group(1) if md5_match else ''
          
          timestamp = int(time.time())
          
          print(f'found latest build: {filename}')
          print(f'size: {filesize} bytes | md5: {md5}')
          
          # inject into ur map
          with open('o1s.json', 'r') as f:
              data = json.load(f)
              
          data['response'][0]['timestamp'] = timestamp
          data['response'][0]['filename'] = filename
          data['response'][0]['size'] = filesize
          data['response'][0]['md5'] = md5
          data['response'][0]['download'] = download_url
          
          with open('o1s.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

      - name: commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add o1s.json
          git commit -m "build: automated ota push for latest upload"
          git push
