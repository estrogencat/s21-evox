name: Publish OTA Update

on:
  workflow_dispatch: 

jobs:
  update-ota-map:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: scrape sourceforge and update json
        run: |
          python3 -c "
          import urllib.request, xml.etree.ElementTree as ET, json, time, sys
          
          print('fetching sourceforge rss feed...')
          url = 'https://sourceforge.net/projects/hazel-evolutionx/rss?path=/a16'
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          rss = urllib.request.urlopen(req).read()
          
          root = ET.fromstring(rss)
          
          # look specifically for the newest file that is actually a zip!
          target_item = None
          for item in root.findall('.//item'):
              title = item.find('title')
              if title is not None and title.text.strip().endswith('.zip'):
                  target_item = item
                  break
                  
          if target_item is None:
              print('error: no .zip files found in the feed!')
              sys.exit(1)
              
          filename = target_item.find('title').text.strip()
          download_url = target_item.find('link').text.strip()
          
          # grab the media tags using the literal namespace uri to be 100% safe
          content_tag = target_item.find('{http://search.yahoo.com/mrss/}content')
          if content_tag is None:
              print('error: could not find file size metadata!')
              sys.exit(1)
              
          filesize = int(content_tag.attrib.get('filesize', 0))
          
          md5 = ''
          for h in target_item.findall('{http://search.yahoo.com/mrss/}hash'):
              if h.attrib.get('algo') == 'md5':
                  md5 = h.text.strip()
                  
          timestamp = int(time.time())
          
          print(f'found latest build: {filename}')
          print(f'size: {filesize} bytes | md5: {md5}')
          
          # inject into ur map
          with open('o1s.json', 'r') as f:
              data = json.load(f)
              
          data['response'][0]['timestamp'] = timestamp
          data['response'][0]['filename'] = filename
          data['response'][0]['size'] = filesize
          data['response'][0]['md5'] = md5
          data['response'][0]['download'] = download_url
          
          with open('o1s.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

      - name: commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add o1s.json
          git commit -m "build: automated ota push for latest upload"
          git push
